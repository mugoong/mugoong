name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Build application
        run: npm run build

  deploy_supabase:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: qsifjnbjlejowdvvmnlt

    steps:
      - name: Check Supabase deployment secrets
        id: preflight
        shell: bash
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Supabase deployment
        if: steps.preflight.outputs.ready != 'true'
        run: echo "Skipping Supabase deploy. Add SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD GitHub secrets to enable automatic migrations."

      - name: Checkout repository
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        if: steps.preflight.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        if: steps.preflight.outputs.ready == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply database migrations
        if: steps.preflight.outputs.ready == 'true'
        run: supabase db push

  deploy_vercel:
    needs:
      - quality
      - deploy_supabase
    if: ${{ always() && needs.quality.result == 'success' && (needs.deploy_supabase.result == 'success' || needs.deploy_supabase.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check Vercel deployment secrets
        id: preflight
        shell: bash
        run: |
          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ] && [ -n "$VERCEL_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Vercel CLI deployment
        if: steps.preflight.outputs.ready != 'true'
        run: echo "Skipping Vercel CLI deploy. If this repo is already linked with Vercel Git Integration, production deploys will still happen there automatically on main pushes."

      - name: Checkout repository
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: steps.preflight.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        if: steps.preflight.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        if: steps.preflight.outputs.ready == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        if: steps.preflight.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
